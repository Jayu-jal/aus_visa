<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호주 워홀 막차 계산기 🇦🇺</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #38bdf8;
            --accent-color: #f43f5e;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background-color: var(--primary-color);
            color: #0f172a;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #334155;
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-status {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 16px;
            text-align: center;
        }

        .status-pass { color: #4ade80; }
        .status-fail { color: var(--accent-color); }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; }
        .highlight { color: #f59e0b; font-weight: 700; }

        .cta-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background-color: #4ade80;
            color: #0f172a;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        .cta-btn:hover { opacity: 0.9; }
        
        .footer-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 16px;
            line-height: 1.4;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇦🇺 호주 워홀 막차 계산기</h1>
    <p class="subtitle">만 35세 상향 적용 완료!<br>내 생년월일로 지원 가능 여부와 남은 D-day 확인</p>
    
    <div class="input-group">
        <label for="birthdate">생년월일 입력</label>
        <input type="date" id="birthdate" max="2026-07-01">
    </div>
    
    <button onclick="calculateAge()">막차 확인하기</button>
    
    <div class="result-box" id="resultBox">
        <div class="result-status" id="resultStatus"></div>
        
        <div class="info-row">
            <span class="info-label">현재 만 나이</span>
            <span class="info-value" id="currentAge">-</span>
        </div>
        <div class="info-row" id="deadlineRow">
            <span class="info-label">막차 신청 마감일</span>
            <span class="info-value" id="deadlineDate">-</span>
        </div>
        <div class="info-row" id="ddayRow">
            <span class="info-label">막차까지 남은 기간</span>
            <span class="info-value highlight" id="ddayValue">-</span>
        </div>

        <a href="https://immi.homeaffairs.gov.au/what-we-do/whm-program/latest-news" target="_blank" class="cta-btn" id="linkBtn">👉 호주 이민성 비자 신청하기</a>
        <p class="footer-note">* 마감일 당일 밤 11시 59분(호주 동부시간 기준)까지 이민성 포털에 비자 결제 및 최종 접수가 완료되어야 합니다.</p>
    </div>
</div>

<script>
function calculateAge() {
    const birthInput = document.getElementById('birthdate').value;
    if (!birthInput) {
        alert('생년월일을 선택해주세요!');
        return;
    }

    const birthDate = new Date(birthInput);
    const today = new Date(); // 2026년 현재 기준 적용

    // 1. 만 나이 계산
    let age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    const dayDiff = today.getDate() - birthDate.getDate();
    
    if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age--;
    }

    // 2. 만 36세가 되는 날 (막차 마감일 = 만 36세 생일 전날)
    const deadline = new Date(birthDate.getFullYear() + 36, birthDate.getMonth(), birthDate.getDate() - 1);
    
    // 3. 남은 D-day 계산
    const timeDiff = deadline.getTime() - today.getTime();
    const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));

    // UI 업데이트
    const resultBox = document.getElementById('resultBox');
    const resultStatus = document.getElementById('resultStatus');
    const currentAgeEl = document.getElementById('currentAge');
    const deadlineDateEl = document.getElementById('deadlineDate');
    const ddayValueEl = document.getElementById('ddayValue');
    const linkBtn = document.getElementById('linkBtn');
    const deadlineRow = document.getElementById('deadlineRow');
    const ddayRow = document.getElementById('ddayRow');

    resultBox.style.display = 'block';
    currentAgeEl.innerText = `만 ${age}세`;

    // 지원 가능 여부 판정 (만 35세 이하인 경우 = 만 36세 생일 전날까지)
    if (daysLeft >= 0 && age <= 35) {
        resultStatus.innerHTML = "🎉 호주 워홀 신청 가능합니다!";
        resultStatus.className = "result-status status-pass";
        
        deadlineDateEl.innerText = `${deadline.getFullYear()}년 ${deadline.getMonth() + 1}월 ${deadline.getDate()}일`;
        ddayValueEl.innerText = `D-${daysLeft}일 남음`;
        
        deadlineRow.style.display = 'flex';
        ddayRow.style.display = 'flex';
        linkBtn.style.display = 'block';
    } else {
        resultStatus.innerHTML = "😭 아쉽지만 나이 제한을 초과했습니다.";
        resultStatus.className = "result-status status-fail";
        
        deadlineRow.style.display = 'none';
        ddayRow.style.display = 'none';
        linkBtn.style.display = 'none'; // 지원 불가능하면 링크 숨김
    }
}
</script>

</body>
</html>
