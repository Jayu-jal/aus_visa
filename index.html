<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>호주 워홀 막차 계산기 🇦🇺</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #38bdf8;
            --accent-color: #f43f5e;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 24px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px; /* 모바일 폭 최적화 */
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 6px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
            padding-left: 4px;
        }

        /* 입력칸 스타일 최적화 (크기 축소 및 숫자 키패드 대응) */
        input[type="text"] {
            width: 100%;
            padding: 12px 14px; /* 높이 감소 */
            border-radius: 10px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem; /* 폰트 크기 최적화 (모바일 자동확대 방지) */
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none; /* 모바일 기본 스타일 제거 */
        }

        input[type="text"]::placeholder {
            color: #475569;
            font-weight: 400;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary-color);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--input-border);
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-status {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            text-align: center;
        }

        .status-pass { color: #4ade80; }
        .status-fail { color: var(--accent-color); }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
            padding: 0 4px;
        }

        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; }
        .highlight { color: #f59e0b; font-weight: 700; }

        .cta-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background-color: #4ade80;
            color: #0f172a;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 18px;
            transition: opacity 0.2s;
        }

        .cta-btn:hover { opacity: 0.9; }
        
        .footer-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 14px;
            line-height: 1.4;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇦🇺 호주 워홀 막차 계산기</h1>
    <p class="subtitle">만 35세 상향 적용 완료!<br>내 생년월일로 지원 가능 여부와 남은 D-day 확인</p>
    
    <div class="input-group">
        <label for="birthdate">생년월일 입력</label>
        <!-- type="text"와 inputmode="numeric"을 사용하여 모바일에서 숫자 키패드 유도, placeholder 추가 -->
        <input type="text" id="birthdate" inputmode="numeric" placeholder="예: 19900101 (8자리)" maxlength="8">
    </div>
    
    <button onclick="calculateAge()">막차 확인하기</button>
    
    <div class="result-box" id="resultBox">
        <div class="result-status" id="resultStatus"></div>
        
        <div class="info-row">
            <span class="info-label">현재 만 나이</span>
            <span class="info-value" id="currentAge">-</span>
        </div>
        <div class="info-row" id="deadlineRow">
            <span class="info-label">막차 신청 마감일</span>
            <span class="info-value" id="deadlineDate">-</span>
        </div>
        <div class="info-row" id="ddayRow">
            <span class="info-label">막차까지 남은 기간</span>
            <span class="info-value highlight" id="ddayValue">-</span>
        </div>

        <!-- 수정된 이민성 비자 신청 포털 링크 -->
        <a href="https://immi.homeaffairs.gov.au/visas/getting-a-visa/visa-listing/work-holiday-417" target="_blank" class="cta-btn" id="linkBtn">👉 호주 이민성 비자 신청하기</a>
        <p class="footer-note">* 마감일 당일 밤 11시 59분(호주 동부시간 기준)까지 이민성 포털에 비자 결제 및 최종 접수가 완료되어야 합니다.</p>
    </div>
</div>

<script>
    function calculateAge() {
        const birthInputHTML = document.getElementById('birthdate');
        const birthInput = birthInputHTML.value;

        // 1. 유효성 검사 (8자리 숫자 확인)
        if (!birthInput || birthInput.length !== 8 || isNaN(birthInput)) {
            alert('생년월일 8자리를 숫자만 입력해주세요. (예: 19900101)');
            birthInputHTML.focus();
            return;
        }

        // 2. 문자열에서 연, 월, 일 추출 및 날짜 객체 생성
        const year = parseInt(birthInput.substring(0, 4));
        const month = parseInt(birthInput.substring(4, 6)) - 1; // 월은 0부터 시작
        const day = parseInt(birthInput.substring(6, 8));
        
        const birthDate = new Date(year, month, day);

        // 생성된 날짜가 유효한지 확인 (예: 19900230 같은 날짜 방지)
        if (birthDate.getFullYear() !== year || birthDate.getMonth() !== month || birthDate.getDate() !== day) {
            alert('유효하지 않은 날짜입니다. 다시 확인해주세요.');
            birthInputHTML.focus();
            return;
        }

        // 3. 오늘 날짜 기준 설정 (배포 시 현재 시각 적용)
        const today = new Date(); 

        // 4. 만 나이 계산
        let age = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();
        const dayDiff = today.getDate() - birthDate.getDate();
        
        // 생일이 아직 지나지 않은 경우 만 나이 한 살 뺌
        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
            age--;
        }

        // 5. 만 36세가 되는 날 (막차 마감일 = 만 36세 생일 전날)
        const deadline = new Date(birthDate.getFullYear() + 36, birthDate.getMonth(), birthDate.getDate() - 1);
        
        // 6. 남은 D-day 계산
        const timeDiff = deadline.getTime() - today.getTime();
        const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24)); // 밀리초를 일(day) 단위로 변환

        // UI 업데이트
        const resultBox = document.getElementById('resultBox');
        const resultStatus = document.getElementById('resultStatus');
        const currentAgeEl = document.getElementById('currentAge');
        const deadlineDateEl = document.getElementById('deadlineDate');
        const ddayValueEl = document.getElementById('ddayValue');
        const linkBtn = document.getElementById('linkBtn');
        const deadlineRow = document.getElementById('deadlineRow');
        const ddayRow = document.getElementById('ddayRow');

        resultBox.style.display = 'block';
        currentAgeEl.innerText = `만 ${age}세`;

        // 지원 가능 여부 판정 (만 35세 이하인 경우 = 만 36세 생일 전날까지 D-day가 0 이상)
        if (daysLeft >= 0 && age <= 35) {
            resultStatus.innerHTML = "🎉 호주 워홀 신청 가능합니다!";
            resultStatus.className = "result-status status-pass";
            
            // 날짜 포맷 (예: 2026년 7월 1일)
            deadlineDateEl.innerText = `${deadline.getFullYear()}년 ${deadline.getMonth() + 1}월 ${deadline.getDate()}일`;
            ddayValueEl.innerText = `D-${daysLeft}일 남음`;
            
            deadlineRow.style.display = 'flex';
            ddayRow.style.display = 'flex';
            linkBtn.style.display = 'block';
        } else {
            resultStatus.innerHTML = "😭 아쉽지만 나이 제한을 초과했습니다.";
            resultStatus.className = "result-status status-fail";
            
            deadlineRow.style.display = 'none';
            ddayRow.style.display = 'none';
            linkBtn.style.display = 'none'; // 지원 불가능하면 링크 숨김
        }
    }

    // 엔터키 입력 시 계산 실행 기능 추가
    document.getElementById('birthdate').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            calculateAge();
        }
    });
</script>

</body>
</html>
